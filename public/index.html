<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>脑部训练中心</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <main class="container">
    <nav class="tabs" style="display:flex; gap:10px; margin-bottom:20px;">
      <button class="tab-btn active" data-target="tab-train" style="flex:1; padding:15px; font-size:18px; border-radius:12px; background:#238636; color:white; border:none; cursor:pointer;">训练大厅</button>
      <button class="tab-btn" data-target="tab-stats" style="flex:1; padding:15px; font-size:18px; border-radius:12px; background:#21262d; color:#c9d1d9; border:none; cursor:pointer;">数据总览</button>
    </nav>

    <div id="tab-train" class="tab-pane" style="display:block;">
      <section class="hero">
        <div>
          <h1>脑部训练中心</h1>
          <p>增强认知控制和抗干扰能力，训练数据可保存至本地。</p>
        </div>
        <div class="actions">
          <select id="topic">
            <option value="schulte">舒尔特方格 (Schulte Grid)</option>
            <option value="stroop">Stroop色词 (Stroop Test)</option>
            <option value="sequence">序列记忆 (Sequence Memory)</option>
            <option value="audio">听觉训练 (Auditory Attention)</option>
            <option value="mirror">镜像协调 (Mirror Coordination)</option>
            <option value="categorize">规则分类 (Categorization)</option>
            <option value="memory_story">情景记忆 (Episodic Memory)</option>
          </select>
          <select id="difficulty">
            <option value="1">简单</option>
            <option value="2">中等</option>
            <option value="3">困难</option>
          </select>
          <button id="start">开始训练</button>
        </div>
      </section>

      <section class="panel">
        <h2>训练区</h2>
        <div id="status" class="status">点击开始获取题目</div>
        <div id="prompt" class="prompt">--</div>
        <div id="question" class="question"></div>
        <div id="timer" class="timer">计时：0.0s</div>
        <input id="answer" class="answer" type="text" placeholder="输入你的答案" />
        <button id="submit" class="secondary">提交结果</button>
        <div id="result" class="result"></div>
        
        <div id="post-game-actions" style="display:none; margin-top:15px; gap:10px;">
          <button id="btn-save-score" style="background-color: #28a745;">保存并上传成绩</button>
          <button id="btn-restart" style="background-color: #ffc107; color: #000;">重新开始(同难度)</button>
        </div>
      </section>
    </div>

    <div id="tab-stats" class="tab-pane" style="display:none;">
      <section class="panel">
        <h2>历史训练记录</h2>
        <div class="stats-controls" style="display:flex; justify-content:space-between; margin-bottom: 20px;">
          <button id="btn-clear-stats" style="background-color: #dc3545; padding: 10px;">清空本地记录</button>
          <button id="btn-ai-summary" style="background-color: #6f42c1; padding: 10px;">AI 总结分析</button>
        </div>
        <div id="ai-summary-output" style="display:none; background:#f0f8ff; color:#333; padding:15px; border-radius:8px; margin-bottom:20px; border-left:4px solid #6f42c1; white-space:pre-wrap;"></div>
        <div id="stats-container" style="display:flex; flex-direction:column; gap:20px;">
          <!-- Stats generated by JS -->
        </div>
      </section>
    </div>
  </main>
  <script src="/app.js"></script>
</body>
</html>
